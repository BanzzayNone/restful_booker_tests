[pytest]

python_files = test_*.py *_test.py
python_classes = Test* *Test
python_functions = test_*

markers =
    smoke: быстрая проверка критического функционала
    regression: полное тестирование после изменений
    negative: негативные сценарии 
    contract: проверка структуры ответов (Contract Testing)
    parametrize: тесты с множественными наборами данных


addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S